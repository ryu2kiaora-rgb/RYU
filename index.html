    <script>

        // ===== 位置移動距離計算（節約モード用） =====
function calcDistance(lat1, lon1, lat2, lon2) {
    if (lat1 === null || lat2 === null) return 9999;

    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(Δφ/2) * Math.sin(Δφ/2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}
function sendToGAS(data, logId){
    const pickupDate = new Date(data.pickupTime);

    // カレンダー日付生成
    const dateStr = pickupDate.getFullYear() + "-" +
                    String(pickupDate.getMonth()+1).padStart(2,'0') + "-" +
                    String(pickupDate.getDate()).padStart(2,'0');

    fetch(GAS_URL,{
        method:"POST",
        body:JSON.stringify({
            mode: "add",
            logId: logId,
            driverId: user.uid,
            userName: userName,
            date: dateStr,
            weekday: pickupDate.getDay(),
            hour: pickupDate.getHours(),
            minute: pickupDate.getMinutes(),
            pickupLat: data.startLat,
            pickupLng: data.startLng,
            pickupTime: data.pickupTime,
            dropLat: data.endLat,
            dropLng: data.endLng,
            dropTime: Date.now(),
            amount: data.amount,
            duration: Math.round((Date.now() - data.pickupTime)/1000/60*100)/100,
            distance: calcDistance(data.startLat,data.startLng,data.endLat,data.endLng)
        })
    });
}
        
        // Path Helpers
        const getPublicPath = (col) => `artifacts/${appId}/public/data/${col}`;
        const getPrivatePath = (col) => user ? `artifacts/${appId}/users/${user.uid}/${col}` : null;

        async function initApp() {

        function initMap() {

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(editMap);
        }



// ===== Firebase節約モード（改良版） =====
async function syncStatusToFirestore(force = false) {

    if (!user || currentLat === null || currentLng === null) return;

    // 前回位置との差
    if (!force && lastLat !== null && lastLng !== null) {

        const distance = calcDistance(
            lastLat,
            lastLng,
            currentLat,
            currentLng
        );

        // 30m未満は送信しない（80m→改善）
        if (distance < 30) return;
    }

    const todayStr = getBusinessDate(new Date());

    const todayTotal = salesLogs
        .filter(l => l.dateStr === todayStr)
        .reduce((s, l) => s + l.amount, 0);

    try {

        await db
            .doc(`${getPublicPath('drivers')}/${user.uid}`)
            .set({
                name: userName,
                lat: currentLat,
                lng: currentLng,
                status: isDriving ? "occupied" : "on",
                todaySales: todayTotal,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

        lastLat = currentLat;
        lastLng = currentLng;

    } catch (e) {
        console.log("sync error", e);
    }
}
// [節約モード] GPS監視自体は行うが、Firebaseへの書き込み間隔を制御
function startGPS() {

    if (!navigator.geolocation) return;

    // watchPositionはUI（マップの自車位置）の更新にのみ使用
    watchId = navigator.geolocation.watchPosition((pos) => {

        // GPS精度が悪い場合は無視（iPhone対策）
        if (pos.coords.accuracy > 120) return;

        const { latitude: lat, longitude: lng } = pos.coords;

        currentLat = lat;
        currentLng = lng;

        if (!map) return;

        if (!userMarker) {

            userMarker = L.marker([lat, lng], { 
                icon: L.divIcon({
                    html: createMarkerHtml(userName, isDriving ? 'occupied' : 'on'),
                    className: '',
                    iconSize:[0,0]
                }) 
            }).addTo(map);

            map.setView([lat, lng], 16);

            syncStatusToFirestore(true); // 初回は強制

        } else {

            userMarker.setLatLng([lat, lng]);

        }

    }, (err) => {

        console.log("GPS error", err);

    }, {

        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 20000

    });

    // 書き込みを60秒ごとに制限
    function startSyncInterval() {

    if (syncInterval) clearInterval(syncInterval);

        function listenToDrivers() {
    setInterval(async () => {
        const snap = await db.collection(getPublicPath('drivers')).get();

        const now = new Date();
        let count = 0;

        snap.forEach(doc => {
            const d = doc.data();
            if (d.lat === undefined || d.lng === undefined) return;

            const age = now - (d.updatedAt?.toDate() || now);

            if (age < 3600000) {
                count++;

                if (user && doc.id !== user.uid && map) {
                    const icon = L.divIcon({
                        html: createMarkerHtml(d.name, d.status),
                        className: '',
                        iconSize:[0,0]
                    });

                    if (otherMarkers[doc.id]) {
                        otherMarkers[doc.id]
                          .setLatLng([d.lat, d.lng])
                          .setIcon(icon);
                    } else {
                        otherMarkers[doc.id] = L.marker([d.lat, d.lng], { icon }).addTo(map);
                    }
                }

            } else if (otherMarkers[doc.id]) {
                map.removeLayer(otherMarkers[doc.id]);
                delete otherMarkers[doc.id];
            }
        });

        document.getElementById('online-count').innerText = count;

    }, 30000); // ←30秒
}

        // [節約モード] 売上ログの取得を直近30日分に制限
        function listenToSales() {
            const path = getPrivatePath('sales');
            if (!path) return;
            
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            const dateLimit = formatDate(thirtyDaysAgo);

            // 過去ログ全件ではなく、直近30日のデータのみを監視

async function loadPrediction(){

function drawHeatmap(points){

  if(!points || points.length === 0) return;

  // ===== グリッド化（見えるようにする核心）=====
  const grid = {};

  points.forEach(p => {

    if(!p.lat || !p.lng) return;

    const key =
      Math.floor(p.lat * 100) / 100 + "_" +
      Math.floor(p.lng * 100) / 100;

    if(!grid[key]){
      grid[key] = { lat:0, lng:0, count:0, amount:0 };
    }

    grid[key].lat += p.lat;
    grid[key].lng += p.lng;
    grid[key].count += 1;
    grid[key].amount += p.amount || 1;
  });

  const heatData = Object.values(grid).map(g => [
    g.lat / g.count,
    g.lng / g.count,
    Math.min(g.amount / 3000, 1) // ← 強さ調整OK
  ]);

  // ===== 既存削除 =====
  if(heatLayer) map.removeLayer(heatLayer);

  // ===== ズームでサイズ変える =====
  const zoom = map.getZoom();

  const radius =
    zoom < 13 ? 50 :
    zoom < 15 ? 35 :
    zoom < 17 ? 25 : 15;

  // ===== 描画 =====
  heatLayer = L.heatLayer(heatData, {
    radius: radius,
    blur: 25,
    maxZoom: 17
  }).addTo(map);
}        
        function createMarkerHtml(name, status) {
            const color = status === 'occupied' ? '#ef4444' : '#3b82f6';
            return `<div class="driver-marker-container">
                <div class="status-badge" style="background:${color}">${status==='occupied'?'実車':'空車'}</div>
                <div class="driver-icon-inner" style="color:${color}"><i class="fas fa-car-side"></i></div>
                <div class="driver-name-label">${name || 'ドライバー'}</div>
            </div>`;

        function formatDate(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }
        // ===== 営業日（昼12時区切り） =====
function getBusinessDate(date){

    const d = new Date(date);

    // 12時より前なら前日扱い
    if(d.getHours() < 12){
        d.setDate(d.getDate() - 1);
    }

    return formatDate(d);
}
        // ===== ★追加：営業日考慮タイムスタンプ =====
function getBusinessTimestamp(log){

    const [h,m] = log.timeStr.split(':').map(Number);

    const d = new Date(log.dateStr);

    d.setHours(h, m, 0, 0);

    if(h < 12){
        d.setDate(d.getDate() - 1);
    }

    return d.getTime();
}

        function getPeriodRange(date, closing) {
            let start, end; const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
            if (closing === 31) { start = new Date(y, m, 1); end = new Date(y, m + 1, 0); }
            else { if (d > closing) { start = new Date(y, m, closing + 1); end = new Date(y, m + 1, closing); }
                   else { start = new Date(y, m - 1, closing + 1); end = new Date(y, m, closing); } }
            return { start, end };
        }
