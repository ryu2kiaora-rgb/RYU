/* --- 新しいチャット画面のデザイン --- */

/* チャットパネル本体（右からスライド） */
#chat-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 85%;
    max-width: 400px;
    height: 100vh;
    background: white;
    z-index: 2000;
    transition: right 0.3s ease-out;
    box-shadow: -5px 0 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    /* 👇 ここを追加！ 下側に30px〜50pxの余白を作ります */
    padding-bottom: env(safe-area-inset-bottom); 
}

/* オープン時の状態 */
#chat-panel.open {
  right: 0;
}

/* ヘッダー部分 */
#chat-header {
  padding: 15px;
  background: #2563eb; /* 青色で見やすく */
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}

/* メッセージ表示エリア（ここを読みやすくした） */
#chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  background: #f8fafc; /* 薄いグレー背景 */
}

/* 入力エリアの枠 */
#chat-input-wrap {
  display: flex;
  padding: 10px;
  border-top: 1px solid #e2e8f0;
  background: white;
  gap: 8px;
}

/* 入力欄（文字を大きくして入力しやすく） */
#chat-input {
  flex: 1;
  padding: 10px 15px;
  border: 1px solid #cbd5e1;
  border-radius: 20px;
  font-size: 16px;
  outline: none;
}

/* --- ニコニコ風コメントの土台 --- */
#chatOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%; /* 操作の邪魔にならないよう上半分に限定 */
  pointer-events: none; /* 下の地図を触れるようにする */
  z-index: 9999 !important; /* 絶対に一番上に持ってくる */
  overflow: hidden;
}

/* --- 流れる文字本体 --- */
.comment {
  position: absolute;
  left: 100vw;
  white-space: nowrap;
  font-size: 24px;
  font-weight: bold;
  color: #ffffff;

  text-shadow: 
    2px 2px 0 #000, -2px -2px 0 #000, 
    2px -2px 0 #000, -2px 2px 0 #000,
    0 2px 0 #000, 0 -2px 0 #000, 
    2px 0 0 #000, -2px 0 0 #000,
    3px 3px 5px rgba(0,0,0,0.8);

  /* ★ここ修正 */
  animation: flowAnimation linear forwards;
}

/* --- 右から左へ流す命令 --- */
@keyframes flowAnimation {
  from {
    transform: translateX(0);
  }
  to {
    /* 画面の横幅以上に左へ突き抜ける */
    transform: translateX(-200vw);
  }
}
        

/* 1. 吹き出し本体の設定 */
.driver-bubble {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 8px 12px;        /* 上下を少し広げました */
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    font-size: 11px;
    font-weight: bold;
    z-index: 1000;
    pointer-events: none;
    border: 2px solid #3b82f6;
    animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);

    /* --- 改行と読みやすさの設定 --- */
min-width: 140px;         /* ★ 100px から 140px にアップ（最低限の広さ） */
    max-width: 280px;         /* ★ 200px から 280px にアップ（最大広がる幅） */
    
    padding: 10px 16px;       /* 左右の余白(16px)も少し広げるとゆったりします */
    white-space: pre-wrap;    
    word-wrap: break-word;    
    line-height: 1.5;         /* 行間も少し広げると読みやすいです */
    text-align: center;    /* 文字を中央寄せ */
}

/* 2. 吹き出しの「しっぽ」部分 */
.driver-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 8px 8px 0;
    border-style: solid;
    border-color: white transparent transparent;
}

/* 3. アニメーション */
@keyframes bounceIn {
    0% { transform: translateX(-50%) scale(0); opacity: 0; }
    100% { transform: translateX(-50%) scale(1); opacity: 1; }
}

<script>
function resizeIframe(iframe) {
    try {
        // iframe の中身の高さを取得してセット
        iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
    } catch(e) {
        // 他ドメインの場合は同一ドメイン制限で取得できないので固定高さ
        iframe.style.height = '600px';
    }
}

// ウィンドウリサイズ時にも対応
window.addEventListener('resize', () => {
    const iframe = document.getElementById('external-app-frame');
    resizeIframe(iframe);
});
</script>

function calcDistance(lat1, lon1, lat2, lon2) {
    if (lat1 === null || lat2 === null) return 9999;

    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(Δφ/2) * Math.sin(Δφ/2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

            name: userName,
            lat: currentLat,
            lng: currentLng,
            status: statusToSend // これでGAS側の「色塗り」と名前が一致します

            const icon = L.divIcon({
                html: createMarkerHtml(d.name, d.status),
                className: '',
                iconSize: [0, 0]
            });

            const ANIM_TIME = 12000; // 15秒同期に最適

            const newPos = [d.lat, d.lng];

            if (otherMarkers[d.uid]) {

                const marker = otherMarkers[d.uid];

                // 前回位置（なければ現在位置）
                const prevRaw = lastPositions[d.uid] || marker.getLatLng();
                const prev = Array.isArray(prevRaw)
                    ? prevRaw
                    : [prevRaw.lat, prevRaw.lng];

                marker.setIcon(icon);

                // 距離チェック（微ブレ防止）
                const distance = map.distance(prev, newPos);

                if (distance < 3) {
                    marker.setLatLng(newPos);
                } else {
                    animateMarker(marker, prev, newPos, ANIM_TIME);
                }

            } else {

                const marker = L.marker(newPos, { icon }).addTo(map);
                otherMarkers[d.uid] = marker;

            }

            // ★必ず最後に保存
            lastPositions[d.uid] = newPos;

        });

        // ★ここ重要（forEachの外！）
        Object.keys(otherMarkers).forEach(id => {

            if (!activeDrivers[id]) {

                if (map && otherMarkers[id]) {
                    map.removeLayer(otherMarkers[id]);
                }

                delete otherMarkers[id];
                delete lastPositions[id];
            }

        });

        // オンライン数表示
        const countEl = document.getElementById('online-count');
        if (countEl) countEl.innerText = totalOnline;

    } catch (e) {

        console.error("driver read error", e);

    }
}


// =====================
// 設定
// =====================
const UPDATE_INTERVAL = 15000; // 位置更新間隔（15秒）
const WARP_DISTANCE = 0.001;   // 約100m以上はワープ

// =====================
// 距離チェック
// =====================
function getDistance(start, end) {
    const dx = start[0] - end[0];
    const dy = start[1] - end[1];
    return Math.sqrt(dx * dx + dy * dy);
}

// =====================
// アニメーション（完成版）
// =====================
function animateMarker(marker, start, end) {

    // ★前のアニメを止める
    if (marker._animFrame) {
        cancelAnimationFrame(marker._animFrame);
    }

    // ★距離が大きすぎる場合はワープ（GPSズレ対策）
    const distance = getDistance(start, end);
    if (distance > WARP_DISTANCE) {
        marker.setLatLng(end);
        return;
    }

    const startLat = start[0];
    const startLng = start[1];
    const endLat = end[0];
    const endLng = end[1];

    // ★更新タイミングに合わせたduration
    const duration = UPDATE_INTERVAL - 500;

    const startTime = Date.now();

    // =====================
    // 向き（回転）
    // =====================
    const angle = getBearing(start, end);

    if (marker._icon) {
        marker._icon.style.transition = "transform 0.5s ease-out";
        marker._icon.style.transformOrigin = "center";
        marker._icon.style.transform = `rotate(${angle}deg)`;
    }

    // =====================
    // アニメ本体
    // =====================
    function animate() {

        const now = Date.now();
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // ★軽いイージング（自然さ＋ジャンプ防止のバランス）
        const eased = progress < 0.5
            ? 2 * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        const lat = startLat + (endLat - startLat) * eased;
        const lng = startLng + (endLng - startLng) * eased;

        marker.setLatLng([lat, lng]);

        if (progress < 1) {
            marker._animFrame = requestAnimationFrame(animate);
        }
    }

    animate();
}

// =====================
// 方角計算
// =====================
function getBearing(start, end) {

    const lat1 = start[0] * Math.PI / 180;
    const lat2 = end[0] * Math.PI / 180;
    const dLng = (end[1] - start[1]) * Math.PI / 180;

    const y = Math.sin(dLng) * Math.cos(lat2);
    const x =
        Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);

    let brng = Math.atan2(y, x) * 180 / Math.PI;

    return (brng + 360) % 360;
}

function drawHeatmap(points){

  if(!points || points.length === 0) return;

  // ===== グリッド化（見えるようにする核心）=====
  const grid = {};

  points.forEach(p => {

    if(!p.lat || !p.lng) return;

    const key =
      Math.floor(p.lat * 100) / 100 + "_" +
      Math.floor(p.lng * 100) / 100;

    if(!grid[key]){
      grid[key] = { lat:0, lng:0, count:0, amount:0 };
    }

    grid[key].lat += p.lat;
    grid[key].lng += p.lng;
    grid[key].count += 1;
    grid[key].amount += p.amount || 1;
  });

const heatData = Object.values(grid).map(g => [
  g.lat / g.count,
  g.lng / g.count,
  Math.min(g.count * 0.7, 1)
]);

  // ===== 既存削除 =====
  if(heatLayer) map.removeLayer(heatLayer);

  // ===== ズームでサイズ変える =====
  const zoom = map.getZoom();

  const radius =
    zoom < 13 ? 25 :
    zoom < 15 ? 20 :
    zoom < 17 ? 15 : 10;

  // ===== 描画 =====
  heatLayer = L.heatLayer(heatData, {
    radius: radius,
    blur: 15,
    maxZoom: 17
  }).addTo(map);
}

        <div class="driver-name-label">${name || 'ドライバー'}</div>
    </div>`;
}

        function formatDate(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }
        

// ===== 営業日（正午12時区切り） - 修正版 =====
function getBusinessDate(dateInput) {
    // 入力がなければ現在時刻（日本時間）を使用
    const d = dateInput ? new Date(dateInput) : new Date();

    // ブラウザの時間はすでに日本時間なので、そのままgetHours()を使う
    const hour = d.getHours();

    // 昼12時より前なら、営業日としては「前日の日付」にする
    if (hour < 12) {
        d.setDate(d.getDate() - 1);
    }

    // YYYY-MM-DD 形式で返す
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

// ===== 営業日考慮タイムスタンプも修正 =====
function getBusinessTimestamp(log){
    const [h, m] = log.timeStr.split(':').map(Number);
    const d = new Date(log.dateStr);

    d.setHours(h, m, 0, 0);

    // log.dateStr がすでに営業日の日付なので、
    // ここでさらに日付を引く必要はありません（引くと2重で引くことになります）
    return d.getTime();
}

        function getPeriodRange(date, closing) {
            let start, end; const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
            if (closing === 31) { start = new Date(y, m, 1); end = new Date(y, m + 1, 0); }
            else { if (d > closing) { start = new Date(y, m, closing + 1); end = new Date(y, m + 1, closing); }
                   else { start = new Date(y, m - 1, closing + 1); end = new Date(y, m, closing); } }
            return { start, end };
        }

        // 既存マーカー
        // =====================
        if (otherMarkers[d.uid]) {

            const marker = otherMarkers[d.uid];

            // ★前回位置（なければ現在位置）
            let prev = lastPositions[d.uid];

            if (!prev) {
                prev = newPos;
                marker.setLatLng(newPos);
            }

            // ★距離チェック（遠すぎたらリセット）
            const distance = getDistance(prev, newPos);
            if (distance > 0.001) {
                marker.setLatLng(newPos);
                lastPositions[d.uid] = newPos;
                return;
            }

            // ★アイコンは変化があるときだけ
            if (marker._status !== d.status || marker._name !== d.name) {

                const icon = L.divIcon({
                    html: createMarkerHtml(d.name, d.status),
                    className: '',
                    iconSize: [0, 0]
                });

                marker.setIcon(icon);
                marker._status = d.status;
                marker._name = d.name;
            }

            // ★アニメーション（durationは渡さない！）
            animateMarker(marker, prev, newPos);

        } 
        
        // =====================
        // 新規マーカー
        // =====================
        else {

            const icon = L.divIcon({
                html: createMarkerHtml(d.name, d.status),
                className: '',
                iconSize: [0, 0]
            });

            const marker = L.marker(newPos, { icon }).addTo(map);

            marker._status = d.status;
            marker._name = d.name;

            otherMarkers[d.uid] = marker;
        }

        // ★位置保存（最後にやるのが重要）
        lastPositions[d.uid] = newPos;

    });

    // =====================
    // 消えたユーザー削除
    // =====================
    Object.keys(otherMarkers).forEach(id => {

        if (!activeDrivers[id]) {

            if (map && otherMarkers[id]) {
                map.removeLayer(otherMarkers[id]);
            }

            delete otherMarkers[id];
            delete lastPositions[id];
        }

    });


    const countEl = document.getElementById('online-count');
    if (countEl) countEl.innerText = totalOnline;
}

function showMapPerformance(data) {

    if (data.type !== "start" && data.type !== "end") return;

    // ★連続移動防止（5秒）

            duration: 0.8
        });
    }

}

// 3. イベントを送信する共通関数（メッセージ制御版）
async function broadcastEvent(type, amount = 0) {
    if (!user || !user.uid) return;

    let msg = ""; 
    let finalType = type;
    
// --- ★ここで「自分の名札」もセットで更新する ---

    msg = startMsgs[Math.floor(Math.random() * startMsgs.length)];

} else if (type === 'end' || type === 'silent_end') {
    driverStatus = "vacant";   // 空車
    finalType = 'end';
    if (type === 'end' && amount > 0) {
        msg = `${safeUserName}さんが\n到着しました！\n(¥${amount.toLocaleString()})`;

         triggerConfetti(); 
                    
    } else {
        msg = ""; // 0円やサイレントの時はメッセージなし
    }

} else if (type === 'pickup') {
    driverStatus = "pickup";   // 迎車
    msg = ""; 
}

    // GAS送信処理（以下略）
    try {
        await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                mode: "event",
                uid: user.uid,
                userName: safeUserName,
                type: finalType,
                message: msg,
                amount: amount,
                timestamp: Date.now()
            })
        });
        // ★送信直後に「今の状態」を即座にGASへ念押しする
        sendLocationToGAS(); 
    } catch (e) { console.error(e); }
}

<script>
// --- 設定拡張 ---
const PIP_CONFIG = {
    updateInterval: 3 * 60 * 1000,
    slideInterval: 15 * 1000, // 15秒ごとにランキングの種類を切り替え
    fps: 12,
    colors: {
        bg: '#ffffff', panel: '#f8fafc', me: '#eff6ff',
        textMain: '#1e293b', textMe: '#2563eb', gold: '#f59e0b', red: '#ef4444'
    }
};

let allRankingData = { "売上": [], "件数": [], "平均単価": [], "最高単価": [] };
let currentType = "売上"; // 現在表示中の種類
let lastSlideTime = Date.now();
let lastFetchTime = Date.now();

const canvas = document.getElementById('ranking-canvas');
const ctx = canvas.getContext('2d');
const pipVideo = document.getElementById('pip-video');
let notifications = [];
let shineEffect = { active: false, index: -1, alpha: 0 };

// 角丸のおまじない
CanvasRenderingContext2D.prototype.fillRoundedRect = function(x, y, w, h, r) {
    this.beginPath(); this.moveTo(x+r, y);
    this.arcTo(x+w, y, x+w, y+h, r); this.arcTo(x+w, y+h, x, y+h, r);
    this.arcTo(x, y+h, x, y, r); this.arcTo(x, y, x+w, y, r);
    this.closePath(); this.fill();
};

// --- 1. データ取得 (4項目すべて集計) ---
async function fetchRankingWithDelay() {
    const jitter = Math.random() * 10000;
    setTimeout(async () => {
        try {
            const res = await fetch(GAS_URL + "?mode=ranking");
            const rawData = await res.json(); 

            // --- ここでGASからのデータを整理 ---
            const drivers = rawData.map(d => ({
  id: d.driverId,
  name: d.userName,
  total: d.amount,
  count: d.count || 0,
  avg: d.count ? Math.floor(d.amount / d.count) : 0,
  max: d.maxPrice || 0,
  isMe: d.driverId === (typeof user !== 'undefined' ? user?.uid : null)
}));

            // 4つのランキングを作成
            const createList = (sortKey) => [...drivers].sort((a,b) => b[sortKey] - a[sortKey]);
            
            const newAllData = {
                "売上": createList('total'),
                "件数": createList('count'),
                "平均単価": createList('avg'),
                "最高単価": createList('max')
            };

            // 順位変動チェック
            if (allRankingData && allRankingData["売上"]) {
                const oldMeIdx = allRankingData["売上"].findIndex(d => d.isMe);
                const newMeIdx = newAllData["売上"].findIndex(d => d.isMe);
                if (newMeIdx > oldMeIdx && oldMeIdx !== -1) {
                    if (typeof addNotification === 'function') addNotification("売上順位ダウン！");
                }
            }

            allRankingData = newAllData;
            lastFetchTime = Date.now();
            
            // UI更新の関数があればここで呼ぶ
            if (typeof updateRankingUI === 'function') updateRankingUI();

        } catch (e) { 
            console.error("Fetch Error:", e); 
        }
    }, jitter);
}

// --- 2. 描画エンジン (スライド機能付き) ---
function renderCanvas() {
    if (!ctx) return;
    const isPiP = !!document.pictureInPictureElement;

    // --- 1. スライド切り替えロジック（ここはそのまま） ---
    if (Date.now() - lastSlideTime > PIP_CONFIG.slideInterval) {
        const types = Object.keys(allRankingData);
        let nextIdx = types.indexOf(currentType) + 1;
        if (nextIdx >= types.length) nextIdx = 0;
        currentType = types[nextIdx];
        lastSlideTime = Date.now();
        allRankingData[currentType].forEach(d => d.y = 400);
    }

    // --- 2. 描画のリセットと背景塗り ---
    ctx.setTransform(1, 0, 0, 1, 0, 0); // ★重要：縮小を一度リセットする
    ctx.fillStyle = PIP_CONFIG.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height); // キャンバス全体を白く塗る

    // --- 3. 縮小と位置の微調整 ---
    ctx.scale(1, 1);      // ★全体を0.8倍に小さくするときは0.8に
    ctx.translate(0, 0);    // ★縮小して空いたスペース分、少し右下にずらす

    // --- 4. ビーコン（ここからは縮小された世界で描画される） ---
    if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = PIP_CONFIG.colors.red;
        ctx.beginPath(); ctx.arc(25, 30, 8, 0, Math.PI * 2); ctx.fill();
    }
    
    // ...（以下、タイトルやランキングの描画コードが続く）

    // タイトル (現在の種類を表示)
    ctx.fillStyle = PIP_CONFIG.colors.textMain;
    ctx.font = "bold 22px sans-serif";
    ctx.fillText(`本日の${currentType} TOP5`, 50, 40);

    // プログレスバー (次のデータ更新まで)
    const prog = Math.min((Date.now() - lastFetchTime) / PIP_CONFIG.updateInterval, 1);
    ctx.fillStyle = "#e2e8f0"; ctx.fillRect(0, 392, 300, 8);
    ctx.fillStyle = "#60a5fa"; ctx.fillRect(0, 392, 300 * (1 - prog), 8);

    // スライドインジケーター (今どのランキングかドットで表示)
    const types = Object.keys(allRankingData);
    types.forEach((t, i) => {
        ctx.fillStyle = (t === currentType) ? "#60a5fa" : "#e2e8f0";
        ctx.beginPath(); ctx.arc(230 + (i * 15), 30, 4, 0, Math.PI*2); ctx.fill();
    });

    // ランキング描画
    const currentList = allRankingData[currentType];
    currentList.forEach((d, i) => {
        const targetY = 65 + (i * 55);
        if (typeof d.y === 'undefined') d.y = 400;
        d.y += (targetY - d.y) * 0.1;

        ctx.fillStyle = d.isMe ? PIP_CONFIG.colors.me : PIP_CONFIG.colors.panel;
        ctx.fillRoundedRect(10, d.y, 280, 55, 12);
        
        // メダル・順位
        ctx.font = "30px sans-serif";
        if (i === 0) ctx.fillText("🥇", 18, d.y + 38);
        else if (i === 1) ctx.fillText("🥈", 18, d.y + 38);
        else if (i === 2) ctx.fillText("🥉", 18, d.y + 38);
        else {
            ctx.fillStyle = "#94a3b8"; ctx.font = "italic bold 24px sans-serif";
            ctx.fillText(`${i + 1}`, 25, d.y + 38);
        }

        // 値の整形
        let valText = "";
        if (currentType === "売上") valText = `¥${d.total.toLocaleString()}`;
        if (currentType === "件数") valText = `${d.count}件`;
        if (currentType === "平均単価") valText = `¥${d.avg.toLocaleString()}`;
        if (currentType === "最高単価") valText = `¥${d.max.toLocaleString()}`;

        ctx.font = "bold 20px monospace";
        const valWidth = ctx.measureText(valText).width;
        ctx.fillStyle = d.isMe ? PIP_CONFIG.colors.textMe : PIP_CONFIG.colors.textMain;
        ctx.textAlign = "right"; ctx.fillText(valText, 280, d.y + 36);
        ctx.textAlign = "left";

        // 名前カット
        ctx.font = "bold 18px sans-serif";
        let disp = d.name;
        const maxW = 280 - 65 - valWidth - 15;
        if (ctx.measureText(disp).width > maxW) {
            while (ctx.measureText(disp + "...").width > maxW && disp.length > 0) disp = disp.slice(0, -1);
            disp += "...";
        }
        ctx.fillText(disp, 62, d.y + 36);
    });

    // ガイド
    ctx.fillStyle = "#94a3b8"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(isPiP ? "タップしてアプリに戻る" : "タップして小窓(PiP)で表示", 150, 385);
    ctx.textAlign = "left";

    // 通知
    notifications.forEach(n => {
        ctx.fillStyle = `rgba(239, 68, 68, ${n.alpha})`; ctx.font = "bold 20px sans-serif";
        ctx.textAlign = "center"; ctx.fillText(n.msg, 150, 360); ctx.textAlign = "left";
        n.timer--; if (n.timer < 30) n.alpha -= 0.1;
    });
    notifications = notifications.filter(n => n.alpha > 0);
}

function addNotification(msg) { notifications.push({ msg, timer: 120, alpha: 1 }); }
function triggerShine(index) { shineEffect = { active: true, index, alpha: 1 }; }

// 1. ページ読み込み時、またはデータ受信時に「裏側」で準備を済ませておく
function setupPiP() {
    const pipVideo = document.getElementById('pip-video');
    const stream = canvas.captureStream(30);
    pipVideo.srcObject = stream;
    // 裏で「再生状態」にしておく（透明なので見えません）
    pipVideo.play().catch(() => {
        console.log("自動再生はブロックされましたが、準備はOKです");
    });
}

// 2. ボタンを押した時は「浮かせる」だけにする
async function togglePiP() {
    const pipVideo = document.getElementById('pip-video');
    
    try {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else {
            // ★重要：ボタンを押した瞬間に「request」だけを呼ぶ
            // すでに play() 状態であれば、iPhoneでも即座に浮き上がります
            await pipVideo.requestPictureInPicture();
        }
    } catch (error) {
        // もし準備が間に合っていなかったら、その場でもう一度セットアップ
        const stream = canvas.captureStream(30);
        pipVideo.srcObject = stream;
        await pipVideo.play();
        await pipVideo.requestPictureInPicture();
    }
}

// アプリ起動時に実行しておく
setupPiP();
    
canvas.addEventListener('click', togglePiP);
fetchRankingWithDelay();
setInterval(fetchRankingWithDelay, PIP_CONFIG.updateInterval);
setInterval(renderCanvas, 100); 
</script>
