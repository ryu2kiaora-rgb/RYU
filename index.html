        // ===== 位置移動距離計算（節約モード用） =====
function calcDistance(lat1, lon1, lat2, lon2) {
    if (lat1 === null || lat2 === null) return 9999;

    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(Δφ/2) * Math.sin(Δφ/2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}
function sendToGAS(data, logId){
    const pickupDate = new Date(data.pickupTime);

    // カレンダー日付生成
    const dateStr = pickupDate.getFullYear() + "-" +
                    String(pickupDate.getMonth()+1).padStart(2,'0') + "-" +
                    String(pickupDate.getDate()).padStart(2,'0');

    fetch(GAS_URL,{
        method:"POST",
        body:JSON.stringify({
            mode: "add",
            logId: logId,
            driverId: user.uid,
            userName: userName,
            date: dateStr,
            weekday: pickupDate.getDay(),
            hour: pickupDate.getHours(),
            minute: pickupDate.getMinutes(),
            pickupLat: data.startLat,
            pickupLng: data.startLng,
            pickupTime: data.pickupTime,
            dropLat: data.endLat,
            dropLng: data.endLng,
            dropTime: Date.now(),
            amount: data.amount,
            duration: Math.round((Date.now() - data.pickupTime)/1000/60*100)/100,
            distance: calcDistance(data.startLat,data.startLng,data.endLat,data.endLng)
        })
    });
}

function initMap() {

// ===== Firebase節約モード（改良版） =====
// --- 修正後のコード ---
async function syncStatusToFirestore(force=false){
    if(!user || currentLat===null || currentLng===null) return;

    if(!force && lastLat!==null && lastLng!==null){
        const distance = calcDistance(lastLat, lastLng, currentLat, currentLng);
        if(distance < 80) return;
    }

    const todayStr = getBusinessDate(new Date());
    const todayTotal = salesLogs
        .filter(l=>l.dateStr===todayStr)
        .reduce((s,l)=>s+l.amount,0);

    let newStatus = isDriving ? "occupied" : "on";

    if(driverStatus === "pickup" && !isDriving){
        newStatus = "pickup";
    }

    try {
        await db
            .doc(`${getPublicPath('drivers')}/${user.uid}`)
            .set({
                name: userName,
                lat: currentLat,
                lng: currentLng,
                status: newStatus,
                todaySales: todayTotal,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, {merge: true});

        lastLat = currentLat;
        lastLng = currentLng;

    } catch(e) {
        console.error("sync error", e);
    }
}
// [節約モード] GPS監視自体は行うが、Firebaseへの書き込み間隔を制御
function startGPS(){

if(!navigator.geolocation) return

// 既存マーカー削除（残像防止）
if(userMarker){
    map.removeLayer(userMarker)
    userMarker=null
}

watchId = navigator.geolocation.watchPosition((pos)=>{

if(pos.coords.accuracy>120) return

const lat = pos.coords.latitude
const lng = pos.coords.longitude

currentLat=lat
currentLng=lng

if(!map) return

if(!userMarker){

userMarker=L.marker([lat,lng],{
icon:L.divIcon({
html:createMarkerHtml(userName,isDriving?'occupied':'on'),
className:'',
iconSize:[0,0]
})
}).addTo(map)

map.setView([lat,lng],16)

syncStatusToFirestore(true)

}else{

userMarker.setLatLng([lat,lng])

}

},(err)=>{

console.log("GPS error",err)

},{
enableHighAccuracy:true,
maximumAge:15000,
timeout:20000
})

startSyncInterval()

}

let driverInterval = null;

async function listenToDrivers() {
    if (driverInterval) return;

    const fetchDrivers = async () => {
        // 【本番用：復活】自分の位置が確定するまで読み込みを開始しない
        if (currentLat === null || currentLng === null) return;
        
        console.log("--- 15分フィルタ実行開始 ---");
        const path = getPublicPath('drivers');

        try {
            const now = new Date();
            // 15分前の時刻を計算
            const fifteenMinutesAgo = new Date(now.getTime() - 15 * 60 * 1000);

            // 15分以内に更新があったドライバーだけを取得
            const snap = await db.collection(path)
                .where('updatedAt', '>', fifteenMinutesAgo)
                .get();

            let totalOnline = 0;
            const activeDrivers = {}; 

            snap.forEach(doc => {
                const d = doc.data();
                if (d.lat === undefined || d.lng === undefined) return;

                activeDrivers[doc.id] = true;
                totalOnline++;

                // 自分以外を地図に表示
                if (user && doc.id === user.uid) return;

                if (map) {
                    const icon = L.divIcon({
                        html: createMarkerHtml(d.name, d.status),
                        className: '',
                        iconSize: [0, 0]
                    });

                    if (otherMarkers[doc.id]) {
                        otherMarkers[doc.id].setLatLng([d.lat, d.lng]).setIcon(icon);
                    } else {
                        otherMarkers[doc.id] = L.marker([d.lat, d.lng], { icon }).addTo(map);
                    }
                }
            });

            // 15分以上更新がない人を地図から削除
            Object.keys(otherMarkers).forEach(id => {
                if (!activeDrivers[id]) {
                    if (map && otherMarkers[id]) {
                        map.removeLayer(otherMarkers[id]);
                    }
                    delete otherMarkers[id];
                }
            });

            // オンライン人数の更新（自分も含む）
            const countEl = document.getElementById('online-count');
            if (countEl) countEl.innerText = totalOnline;

        } catch (e) {
            console.error("driver read error", e);
        }
    };

    // 初回実行を5秒後、その後1.5分おき
    setTimeout(fetchDrivers, 5000);
    driverInterval = setInterval(fetchDrivers, 90000);
}

function drawHeatmap(points){

  if(!points || points.length === 0) return;

  // ===== グリッド化（見えるようにする核心）=====
  const grid = {};

  points.forEach(p => {

    if(!p.lat || !p.lng) return;

    const key =
      Math.floor(p.lat * 100) / 100 + "_" +
      Math.floor(p.lng * 100) / 100;

    if(!grid[key]){
      grid[key] = { lat:0, lng:0, count:0, amount:0 };
    }

    grid[key].lat += p.lat;
    grid[key].lng += p.lng;
    grid[key].count += 1;
    grid[key].amount += p.amount || 1;
  });

const heatData = Object.values(grid).map(g => [
  g.lat / g.count,
  g.lng / g.count,
  Math.min(g.count * 0.7, 1)
]);

  // ===== 既存削除 =====
  if(heatLayer) map.removeLayer(heatLayer);

  // ===== ズームでサイズ変える =====
  const zoom = map.getZoom();

  const radius =
    zoom < 13 ? 25 :
    zoom < 15 ? 20 :
    zoom < 17 ? 15 : 10;

  // ===== 描画 =====
  heatLayer = L.heatLayer(heatData, {
    radius: radius,
    blur: 15,
    maxZoom: 17
  }).addTo(map);
}

        <div class="driver-name-label">${name || 'ドライバー'}</div>
    </div>`;
}

        function formatDate(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }
        // ===== 営業日（昼12時区切り） =====
function getBusinessDate(date){

    const d = new Date(date);

    // 12時より前なら前日扱い
    if(d.getHours() < 12){
        d.setDate(d.getDate() - 1);
    }

    return formatDate(d);
}
        // ===== ★追加：営業日考慮タイムスタンプ =====
function getBusinessTimestamp(log){

    const [h,m] = log.timeStr.split(':').map(Number);

    const d = new Date(log.dateStr);

    d.setHours(h, m, 0, 0);

    if(h < 12){
        d.setDate(d.getDate() - 1);
    }

    return d.getTime();
}

        function getPeriodRange(date, closing) {
            let start, end; const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
            if (closing === 31) { start = new Date(y, m, 1); end = new Date(y, m + 1, 0); }
            else { if (d > closing) { start = new Date(y, m, closing + 1); end = new Date(y, m + 1, closing); }
                   else { start = new Date(y, m - 1, closing + 1); end = new Date(y, m, closing); } }
            return { start, end };
        }

            }
        };

document.getElementById('header-btn-end-shift').onclick = async () => {

    if (!confirm('シフトを終了しますか？')) return;

    // 1 状態
    isDriving = false;

    // 2 同期停止
    if(syncInterval){
        clearInterval(syncInterval);
        syncInterval = null;
    }

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    // 3 Firestore削除
    if(user){
        try{
            await db.doc(`${getPublicPath('drivers')}/${user.uid}`).delete();
            console.log("ドライバー削除完了");
        }catch(e){
            console.log("削除エラー", e);
        }
    }

    // 4 自分マーカー削除
    if(userMarker){
        map.removeLayer(userMarker);
        userMarker = null;
    }

    // 5 他ドライバー削除
    Object.keys(otherMarkers).forEach(id=>{
        map.removeLayer(otherMarkers[id]);
    });

    otherMarkers = {};

    // 6 位置リセット
    currentLat = null;
    currentLng = null;
    lastLat = null;
    lastLng = null;

    // 7 オンライン人数リセット
    document.getElementById("online-count").innerText = "0";

    // 8 overlay表示
    document.getElementById("shift-overlay").style.display = "flex";

};

   <script>
const MY_ID = localStorage.getItem("driverId") || null;
let lastUpdate = null;
let currentSlide = 0;
const slideInterval = 8000; // 8秒ごとにスライド
const updateInterval = 15 * 60 * 1000; // 15分ごとにGASからデータ取得

const slideTypes = ["売上", "平均単価", "件数", "高単価"];

async function loadRankingData() {
  try {
    const res = await fetch(GAS_URL + "?mode=ranking");
    const data = await res.json();

    // 集計
    const summary = {};
    data.forEach(d=>{
      if(!summary[d.driverId]){
        summary[d.driverId] = {userName: d.userName, amount:0, count:0, max:0};
      }
      summary[d.driverId].amount += d.amount;
      summary[d.driverId].count += 1;
      summary[d.driverId].max = Math.max(summary[d.driverId].max, d.amount);
    });

    const arr = Object.keys(summary).map(id=>{
      const v = summary[id];
      return {
        driverId: id,
        userName: v.userName,
        totalAmount: v.amount,
        count: v.count,
        avgAmount: Math.round(v.amount/v.count),
        maxAmount: v.max
      };
    });

    lastUpdate = new Date();
    return arr;
  } catch(e){
    console.error("ランキング取得エラー", e);
    return [];
  }
}

function renderRanking(data){
  const box = document.getElementById("ranking-list");
  if(!box || data.length===0) return;

  const type = slideTypes[currentSlide % slideTypes.length];

  // ソート
  let sorted = [];
  switch(type){
    case "売上": sorted = data.sort((a,b)=>b.totalAmount - a.totalAmount); break;
    case "平均単価": sorted = data.sort((a,b)=>b.avgAmount - a.avgAmount); break;
    case "件数": sorted = data.sort((a,b)=>b.count - a.count); break;
    case "高単価": sorted = data.sort((a,b)=>b.maxAmount - a.maxAmount); break;
  }

  const top5 = sorted.slice(0,5);

  // タイトルに何のランキングかを明示
  let html = `<div style="font-weight:bold;margin-bottom:6px; color:#FFD700;">
      <i class="fas fa-trophy mr-1"></i>${type}Ranking TOP5
    </div>`;

  top5.forEach((d,i)=>{
    const isMe = String(d.driverId) === String(MY_ID);
    let value = 0;
    switch(type){
      case "売上": value = d.totalAmount; break;
      case "平均単価": value = d.avgAmount; break;
      case "件数": value = d.count; break;
      case "高単価": value = d.maxAmount; break;
    }

    html += `<div style="display:flex;justify-content:space-between;padding:2px 0;
      background:${isMe?"rgba(255,215,0,0.2)":"transparent"};
      font-weight:${i===0?"bold":"normal"};">
      <span>${i+1}. ${d.userName}</span>
      <span>${value}${type==="件数"?"件":"円"}</span>
      ${isMe?" ←自分":""}
    </div>`;
  });

  // 更新時間の色を濃くして見やすく
  if(lastUpdate){
    const h = String(lastUpdate.getHours()).padStart(2,'0');
    const m = String(lastUpdate.getMinutes()).padStart(2,'0');
    html += `<div style="margin-top:4px;font-size:10px;color:#ff0000;">
      更新: ${h}:${m} （15分毎 自動更新）
    </div>`;
  }

  box.innerHTML = html;
  currentSlide++;
}

async function startGASRanking(){
  let data = await loadRankingData();
  renderRanking(data);

  // スライド切替
  setInterval(()=>renderRanking(data), slideInterval);

  // 15分ごとのデータ更新
  setInterval(async ()=>{
    data = await loadRankingData();
    currentSlide = 0; // スライドリセット
  }, updateInterval);
}

// 元ランキング表示関数があればコメントアウトする
// updateRankingList(snapshot) { ... }

startGASRanking();
</script>
