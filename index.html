    content: '';

    border-style: solid;
    border-color: white transparent transparent;

<script>
function resizeIframe(iframe) {
    try {
        // iframe の中身の高さを取得してセット
        iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
    } catch(e) {
        // 他ドメインの場合は同一ドメイン制限で取得できないので固定高さ
        iframe.style.height = '600px';
    }
}

// ウィンドウリサイズ時にも対応
window.addEventListener('resize', () => {
    const iframe = document.getElementById('external-app-frame');
    resizeIframe(iframe);

        // ===== 位置移動距離計算（節約モード用） =====
function calcDistance(lat1, lon1, lat2, lon2) {
    if (lat1 === null || lat2 === null) return 9999;

    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(Δφ/2) * Math.sin(Δφ/2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

            distance: calcDistance(data.startLat,data.startLng,data.endLat,data.endLng)
        })
    });
}

        function animateMarker(marker, start, end, duration = 30000) {

    const startTime = Date.now();

    const angle = getBearing(start, end);

    if (marker._icon) {
        marker._icon.style.transformOrigin = "center";
        marker._icon.style.transform = `rotate(${angle}deg)`;
    }

    function animate() {

        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);

        const lat = start[0] + (end[0] - start[0]) * progress;
        const lng = start[1] + (end[1] - start[1]) * progress;

        marker.setLatLng([lat, lng]);

        if (progress < 1) requestAnimationFrame(animate);
    }

    animate();
}

function getBearing(start, end) {

    const lat1 = start[0] * Math.PI / 180;
    const lat2 = end[0] * Math.PI / 180;
    const dLng = (end[1] - start[1]) * Math.PI / 180;

    const y = Math.sin(dLng) * Math.cos(lat2);
    const x =
        Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);

    let brng = Math.atan2(y, x) * 180 / Math.PI;

    return (brng + 360) % 360;
}

function drawHeatmap(points){

  if(!points || points.length === 0) return;

  // ===== グリッド化（見えるようにする核心）=====
  const grid = {};

  points.forEach(p => {

    if(!p.lat || !p.lng) return;

    const key =
      Math.floor(p.lat * 100) / 100 + "_" +
      Math.floor(p.lng * 100) / 100;

    if(!grid[key]){
      grid[key] = { lat:0, lng:0, count:0, amount:0 };
    }

    grid[key].lat += p.lat;
    grid[key].lng += p.lng;
    grid[key].count += 1;
    grid[key].amount += p.amount || 1;
  });

const heatData = Object.values(grid).map(g => [
  g.lat / g.count,
  g.lng / g.count,
  Math.min(g.count * 0.7, 1)
]);

  // ===== 既存削除 =====
  if(heatLayer) map.removeLayer(heatLayer);

  // ===== ズームでサイズ変える =====
  const zoom = map.getZoom();

  const radius =
    zoom < 13 ? 25 :
    zoom < 15 ? 20 :
    zoom < 17 ? 15 : 10;

  // ===== 描画 =====
  heatLayer = L.heatLayer(heatData, {
    radius: radius,
    blur: 15,
    maxZoom: 17
  }).addTo(map);
}        
function createMarkerHtml(name, status) {

    // statusが 'vacant' や 'on' の場合はデフォルトの青になります

}

        function formatDate(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }
        

// ===== 営業日（正午12時区切り） - 修正版 =====
function getBusinessDate(dateInput) {
    // 入力がなければ現在時刻（日本時間）を使用
    const d = dateInput ? new Date(dateInput) : new Date();

    // ブラウザの時間はすでに日本時間なので、そのままgetHours()を使う
    const hour = d.getHours();

    // 昼12時より前なら、営業日としては「前日の日付」にする
    if (hour < 12) {
        d.setDate(d.getDate() - 1);
    }

    // YYYY-MM-DD 形式で返す
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

// ===== 営業日考慮タイムスタンプも修正 =====
function getBusinessTimestamp(log){
    const [h, m] = log.timeStr.split(':').map(Number);
    const d = new Date(log.dateStr);

    d.setHours(h, m, 0, 0);

    // log.dateStr がすでに営業日の日付なので、
    // ここでさらに日付を引く必要はありません（引くと2重で引くことになります）
    return d.getTime();
}

        function getPeriodRange(date, closing) {
            let start, end; const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
            if (closing === 31) { start = new Date(y, m, 1); end = new Date(y, m + 1, 0); }
            else { if (d > closing) { start = new Date(y, m, closing + 1); end = new Date(y, m + 1, closing); }
                   else { start = new Date(y, m - 1, closing + 1); end = new Date(y, m, closing); } }
            return { start, end };
        }

async function broadcastEvent(type, amount = 0) {
    if (!user || !user.uid) return;
    const safeUserName = userName || "unknown";

    let msg = ""; 
    let finalType = type;

    if (type === 'start') {
        msg = `${safeUserName}さんが実車になりました！`;
        driverStatus = "occupied"; // 変数も更新

    } else if (type === 'end') {
        if (amount > 0) {
            msg = `${safeUserName}さんが到着しました！(¥${amount.toLocaleString()})`;
        } else {
            msg = `${safeUserName}さんが空車になりました。`;
        }
        driverStatus = "vacant"; // 変数も更新
        finalType = 'end';

    } else if (type === 'pickup') {
        msg = `${safeUserName}さんが迎車（お迎え）に向かっています！`;
        driverStatus = "pickup"; // 変数も更新
    }

    try {
        await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                mode: "event",
                uid: user.uid,
                userName: safeUserName,
                type: finalType,
                message: msg,
                amount: amount,
                timestamp: Date.now()
            })
        });
        // 送信直後に位置情報も送ってキャッシュを確実に固める
        sendLocationToGAS();
    } catch (e) { console.error(e); }
}

<script>
// --- 設定拡張 ---
const PIP_CONFIG = {
    updateInterval: 3 * 60 * 1000,
    slideInterval: 15 * 1000, // 15秒ごとにランキングの種類を切り替え
    fps: 12,
    colors: {
        bg: '#ffffff', panel: '#f8fafc', me: '#eff6ff',
        textMain: '#1e293b', textMe: '#2563eb', gold: '#f59e0b', red: '#ef4444'
    }
};

let allRankingData = { "売上": [], "件数": [], "平均単価": [], "最高単価": [] };
let currentType = "売上"; // 現在表示中の種類
let lastSlideTime = Date.now();
let lastFetchTime = Date.now();

const canvas = document.getElementById('ranking-canvas');
const ctx = canvas.getContext('2d');
const pipVideo = document.getElementById('pip-video');
let notifications = [];
let shineEffect = { active: false, index: -1, alpha: 0 };

// 角丸のおまじない
CanvasRenderingContext2D.prototype.fillRoundedRect = function(x, y, w, h, r) {
    this.beginPath(); this.moveTo(x+r, y);
    this.arcTo(x+w, y, x+w, y+h, r); this.arcTo(x+w, y+h, x, y+h, r);
    this.arcTo(x, y+h, x, y, r); this.arcTo(x, y, x+w, y, r);
    this.closePath(); this.fill();
};

// --- 1. データ取得 (4項目すべて集計) ---
async function fetchRankingWithDelay() {
    const jitter = Math.random() * 10000;
    setTimeout(async () => {
        try {
            const res = await fetch(GAS_URL + "?mode=ranking");
            const rawData = await res.json();
            
            const summary = {};
            rawData.forEach(d => {
                if(!summary[d.driverId]) {
                    summary[d.driverId] = { name: d.userName, total: 0, count: 0, max: 0 };
                }
                summary[d.driverId].total += d.amount;
                summary[d.driverId].count += 1;
                if(d.amount > summary[d.driverId].max) summary[d.driverId].max = d.amount;
            });

            const drivers = Object.keys(summary).map(id => ({
                id, name: summary[id].name,
                total: summary[id].total,
                count: summary[id].count,
                avg: Math.floor(summary[id].total / summary[id].count),
                max: summary[id].max,
                isMe: id === (typeof user !== 'undefined' ? user?.uid : null)
            }));

            // 4つのランキングを作成
            const createList = (sortKey) => [...drivers].sort((a,b) => b[sortKey] - a[sortKey]).slice(0, 5);
            
            const newAllData = {
                "売上": createList('total'),
                "件数": createList('count'),
                "平均単価": createList('avg'),
                "最高単価": createList('max')
            };

            // 順位変動チェック（売上の時だけ通知する例）
            const oldMeIdx = allRankingData["売上"].findIndex(d => d.isMe);
            const newMeIdx = newAllData["売上"].findIndex(d => d.isMe);
            if (newMeIdx > oldMeIdx && oldMeIdx !== -1) addNotification("売上順位ダウン！");

            allRankingData = newAllData;
            lastFetchTime = Date.now();
        } catch (e) { console.error("Fetch Error:", e); }
    }, jitter);
}

// --- 2. 描画エンジン (スライド機能付き) ---
function renderCanvas() {
    if (!ctx) return;
    const isPiP = !!document.pictureInPictureElement;

    // --- 1. スライド切り替えロジック（ここはそのまま） ---
    if (Date.now() - lastSlideTime > PIP_CONFIG.slideInterval) {
        const types = Object.keys(allRankingData);
        let nextIdx = types.indexOf(currentType) + 1;
        if (nextIdx >= types.length) nextIdx = 0;
        currentType = types[nextIdx];
        lastSlideTime = Date.now();
        allRankingData[currentType].forEach(d => d.y = 400);
    }

    // --- 2. 描画のリセットと背景塗り ---
    ctx.setTransform(1, 0, 0, 1, 0, 0); // ★重要：縮小を一度リセットする
    ctx.fillStyle = PIP_CONFIG.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height); // キャンバス全体を白く塗る

    // --- 3. 縮小と位置の微調整 ---
    ctx.scale(1, 1);      // ★全体を0.8倍に小さくするときは0.8に
    ctx.translate(0, 0);    // ★縮小して空いたスペース分、少し右下にずらす

    // --- 4. ビーコン（ここからは縮小された世界で描画される） ---
    if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillStyle = PIP_CONFIG.colors.red;
        ctx.beginPath(); ctx.arc(25, 30, 8, 0, Math.PI * 2); ctx.fill();
    }
    
    // ...（以下、タイトルやランキングの描画コードが続く）

    // タイトル (現在の種類を表示)
    ctx.fillStyle = PIP_CONFIG.colors.textMain;
    ctx.font = "bold 22px sans-serif";
    ctx.fillText(`本日の${currentType} TOP5`, 50, 40);

    // プログレスバー (次のデータ更新まで)
    const prog = Math.min((Date.now() - lastFetchTime) / PIP_CONFIG.updateInterval, 1);
    ctx.fillStyle = "#e2e8f0"; ctx.fillRect(0, 392, 300, 8);
    ctx.fillStyle = "#60a5fa"; ctx.fillRect(0, 392, 300 * (1 - prog), 8);

    // スライドインジケーター (今どのランキングかドットで表示)
    const types = Object.keys(allRankingData);
    types.forEach((t, i) => {
        ctx.fillStyle = (t === currentType) ? "#60a5fa" : "#e2e8f0";
        ctx.beginPath(); ctx.arc(230 + (i * 15), 30, 4, 0, Math.PI*2); ctx.fill();
    });

    // ランキング描画
    const currentList = allRankingData[currentType];
    currentList.forEach((d, i) => {
        const targetY = 65 + (i * 55);
        if (typeof d.y === 'undefined') d.y = 400;
        d.y += (targetY - d.y) * 0.1;

        ctx.fillStyle = d.isMe ? PIP_CONFIG.colors.me : PIP_CONFIG.colors.panel;
        ctx.fillRoundedRect(10, d.y, 280, 55, 12);
        
        // メダル・順位
        ctx.font = "30px sans-serif";
        if (i === 0) ctx.fillText("🥇", 18, d.y + 38);
        else if (i === 1) ctx.fillText("🥈", 18, d.y + 38);
        else if (i === 2) ctx.fillText("🥉", 18, d.y + 38);
        else {
            ctx.fillStyle = "#94a3b8"; ctx.font = "italic bold 24px sans-serif";
            ctx.fillText(`${i + 1}`, 25, d.y + 38);
        }

        // 値の整形
        let valText = "";
        if (currentType === "売上") valText = `¥${d.total.toLocaleString()}`;
        if (currentType === "件数") valText = `${d.count}件`;
        if (currentType === "平均単価") valText = `¥${d.avg.toLocaleString()}`;
        if (currentType === "最高単価") valText = `¥${d.max.toLocaleString()}`;

        ctx.font = "bold 20px monospace";
        const valWidth = ctx.measureText(valText).width;
        ctx.fillStyle = d.isMe ? PIP_CONFIG.colors.textMe : PIP_CONFIG.colors.textMain;
        ctx.textAlign = "right"; ctx.fillText(valText, 280, d.y + 36);
        ctx.textAlign = "left";

        // 名前カット
        ctx.font = "bold 18px sans-serif";
        let disp = d.name;
        const maxW = 280 - 65 - valWidth - 15;
        if (ctx.measureText(disp).width > maxW) {
            while (ctx.measureText(disp + "...").width > maxW && disp.length > 0) disp = disp.slice(0, -1);
            disp += "...";
        }
        ctx.fillText(disp, 62, d.y + 36);
    });

    // ガイド
    ctx.fillStyle = "#94a3b8"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(isPiP ? "タップしてアプリに戻る" : "タップして小窓(PiP)で表示", 150, 385);
    ctx.textAlign = "left";

    // 通知
    notifications.forEach(n => {
        ctx.fillStyle = `rgba(239, 68, 68, ${n.alpha})`; ctx.font = "bold 20px sans-serif";
        ctx.textAlign = "center"; ctx.fillText(n.msg, 150, 360); ctx.textAlign = "left";
        n.timer--; if (n.timer < 30) n.alpha -= 0.1;
    });
    notifications = notifications.filter(n => n.alpha > 0);
}

function addNotification(msg) { notifications.push({ msg, timer: 120, alpha: 1 }); }
function triggerShine(index) { shineEffect = { active: true, index, alpha: 1 }; }

// 2. ボタンを押した時は「浮かせる」だけにする
async function togglePiP() {
    const pipVideo = document.getElementById('pip-video');
    
    try {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else {
            // ★重要：ボタンを押した瞬間に「request」だけを呼ぶ
            // すでに play() 状態であれば、iPhoneでも即座に浮き上がります
            await pipVideo.requestPictureInPicture();
        }
    } catch (error) {
        // もし準備が間に合っていなかったら、その場でもう一度セットアップ
        const stream = canvas.captureStream(30);
        pipVideo.srcObject = stream;
        await pipVideo.play();
        await pipVideo.requestPictureInPicture();
    }
}

// アプリ起動時に実行しておく
setupPiP();
    
canvas.addEventListener('click', togglePiP);
fetchRankingWithDelay();
setInterval(fetchRankingWithDelay, PIP_CONFIG.updateInterval);
setInterval(renderCanvas, 100); 
</script>
